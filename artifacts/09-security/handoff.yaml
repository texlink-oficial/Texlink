sprint_plan:
  sprint_1:
    days: "1-2"
    target: "All XS/S backend P0 fixes"
    items: [SEC-REM-001, SEC-REM-003, SEC-REM-006, SEC-REM-007, SEC-REM-008, SEC-REM-014, SEC-REM-015, SEC-REM-018]
  sprint_2:
    days: "3-4"
    target: "Remaining P0 fixes"
    items: [SEC-REM-002, SEC-REM-004, SEC-REM-005]
  sprint_3:
    days: "5-7"
    target: "P1 quick fixes"
    items: [SEC-REM-009, SEC-REM-011, SEC-REM-012, SEC-REM-013]
  sprint_4:
    days: "8-12"
    target: "P1 larger items"
    items: [SEC-REM-016, SEC-REM-017]

qa_test_plan:
  - "Verify all parameterized endpoints reject malformed UUIDs with 400"
  - "Verify mock tokens rejected in staging and production"
  - "Verify no tokens appear in browser storage after login"
  - "Verify security headers present on static assets, HTML, and API responses"
  - "Verify Swagger inaccessible in staging without opt-in flag"
  - "Verify npm audit shows 0 critical/high runtime vulnerabilities"
  - "Verify production logs do not contain CORS origins or sensitive data"
  - "Verify Docker container runs as non-root user"
  - "Verify seed script does not execute in production"
  - "Run OWASP ZAP automated scan against staging"

next_steps:
  - "backend-dev: Start sprint 1 with XS fixes (SEC-REM-001,003,006,007)"
  - "frontend-dev: Fix SEC-REM-004 (refresh token to memory-only)"
  - "qa-engineer: Prepare test cases from qa_test_plan above"
  - "all: Re-run security audit after sprint 4 to verify score improvement"
